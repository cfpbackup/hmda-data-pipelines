apiVersion: batch/v1
kind: Job
metadata:
  name: kedro-etl-pipeline-job-disclosure-leilist-2023
  labels:
    job: kedro-etl-pipeline-job-disclosure-leilist-2023
spec:
  template:
    spec:
      securityContext:
        fsGroup: 999
      containers:
        - name: kedro
          image: hmda-ecr/hmda/kedro-etl-pipeline:latest_image
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: kedro-aws-credentials
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: kedro-aws-credentials
                  key: aws-secret-access-key
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: CURRENT_YEAR
              value: "2023_Filing_Season"
            - name: PARAMS
              value: "max_workers=6,use_lei_list=True"
            - name: TO_OUTPUTS
              value: "disclosure_reports_2023"
            - name: KEDRO_DEV
              value: dev
            - name: STD_ARGS
              value: "--tags=\"$(CURRENT_YEAR)\" --env=$(KEDRO_DEV) --runner=ThreadRunner --params=$(PARAMS) --to-outputs=$(TO_OUTPUTS)"
            - name: SQLALCHEMY_SILENCE_UBER_WARNING
              value: "1"
          volumeMounts:
            - name: kedro-base-credentials
              mountPath: /tmp/kedro-base-credentials
              readOnly: true
            - name: kedro-env-credentials
              mountPath: /tmp/kedro-env-credentials
              readOnly: true
            - name: kedro-s3-paths
              mountPath: /tmp/kedro-s3-paths
              readOnly: true
          command: ["/bin/bash", "-c",
                    "/tmp/setup-job.sh && cd /hmda-etl-pipeline/ && kedro run $(STD_ARGS) --pipeline=aggregate_and_disclosure_reports"]
      volumes:
        - name: kedro-base-credentials
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: kedro-base-creds-spc
        - name: kedro-env-credentials
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: kedro-env-creds-spc
        - name: kedro-s3-paths
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: kedro-s3-paths-spc
      tolerations:
        - key: node-group
          operator: Equal
          value: kedro-regular
      restartPolicy: OnFailure